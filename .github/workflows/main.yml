name: Stock Scraper
on:
  schedule:
    - cron: '45 7 * * 1-5'  # 北京时间 15:45
  workflow_dispatch:
    inputs:
      debug_date:
        description: '调试日期 (格式: YYYY-MM-DD，留空则运行当天)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 显式指定版本，消除 Warning

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium # 必须安装浏览器核心

      - name: Execute Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DEBUG_DATE: ${{ github.event.inputs.debug_date }}
        run: python main.py
