name: Stock Scraper
on:
  schedule:
    - cron: '45 7 * * 1-5'
  workflow_dispatch:
    inputs:
      debug_date:
        description: '调试日期 (格式: YYYY-MM-DD，留空则运行当天)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        # ... 安装依赖步骤同前 ...
      - name: Execute Script
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DEBUG_DATE: ${{ github.event.inputs.debug_date }} # 将网页输入传递给环境变量
        run: python main.py
