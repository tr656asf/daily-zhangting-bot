name: A-share Daily Report

on:
  schedule:
    # 每天北京时间 15:30 运行
    - cron: "30 7 * * 1-5"

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: |
          python main.py
