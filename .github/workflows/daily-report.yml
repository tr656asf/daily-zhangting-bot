name: Daily Report

on:
  # 定时触发：工作日每天北京时间17:00（UTC 09:00）
  schedule:
    - cron: '0 9 * * 1-5'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过周末检查）'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'
      simulate_date:
        description: '模拟日期（用于测试，格式：YYYY-MM-DD）'
        required: false
        default: ''
        type: string

jobs:
  report:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers (if not simulate mode)
      if: ${{ github.event.inputs.simulate_date == '' }}
      run: |
        playwright install chromium
    
    - name: Check configuration
      run: |
        echo "检查配置..."
        if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "❌ 错误：TELEGRAM_BOT_TOKEN 未设置"
          exit 1
        fi
        if [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "❌ 错误：TELEGRAM_CHAT_ID 未设置"
          exit 1
        fi
        echo "✅ 配置正常"
    
    - name: Run report
      env:
        FORCE_RUN: ${{ github.event.inputs.force_run || '0' }}
        SIMULATE_DATE: ${{ github.event.inputs.simulate_date || '' }}
      run: |
        echo "开始运行..."
        if [ "$FORCE_RUN" = "1" ]; then
          echo "⚠️ 强制运行模式"
        fi
        if [ -n "$SIMULATE_DATE" ]; then
          echo "📅 模拟日期：$SIMULATE_DATE"
        fi
        cd src
        python main.py
